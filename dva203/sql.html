<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal SQL Runner</title>
    
    <!-- CodeMirror CSS (from jsdelivr) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/dracula.min.css">

    <style>
        /* 10px font & Dark Modern Theme */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: #121212;
            color: #e0e0e0;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 10px !important;
            overflow: hidden;
        }

        /* Top Toolbar */
        #toolbar {
            height: 36px;
            display: flex;
            align-items: center;
            background-color: #1e1e1e;
            padding: 0 10px;
            border-bottom: 1px solid #333;
        }

        button {
            background-color: #007acc;
            color: #ffffff;
            border: none;
            padding: 6px 16px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px !important;
            font-weight: bold;
            font-family: inherit;
            transition: background-color 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: #0098ff;
        }

        button:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }

        /* Layout */
        #main {
            display: flex;
            height: calc(100vh - 36px);
            width: 100%;
        }

        /* Panels */
        #left {
            /* Initial width */
            flex: 0 0 50%;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #right {
            flex: 1; /* Takes remaining space */
            height: 100%;
            background-color: #1a1a1a;
            overflow-y: auto;
            padding: 10px;
            min-width: 0; /* allows flexbox to shrink properly */
        }

        /* Draggable Splitter */
        #resizer {
            width: 4px;
            background-color: #333;
            cursor: col-resize;
            flex-shrink: 0;
            transition: background-color 0.2s ease;
            z-index: 10;
        }

        #resizer:hover, #resizer.active {
            background-color: #007acc; /* VS Code style active drag bar */
        }

        /* Prevent text selection during drag */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        /* CodeMirror Overrides for 10px text and height */
        .CodeMirror {
            height: 100% !important;
            font-size: 10px !important;
            font-family: inherit !important;
        }

        /* SQL Results Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            background-color: #1e1e1e;
        }

        th, td {
            border: 1px solid #333;
            padding: 5px 8px;
            text-align: left;
        }

        th {
            background-color: #252526;
            color: #4ec9b0; /* distinctive header color */
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #181818;
        }

        /* Status & Error messages */
        .error {
            color: #f44747;
            background: #2a1111;
            padding: 8px;
            border-left: 3px solid #f44747;
            white-space: pre-wrap;
        }

        .success-msg {
            color: #888;
            padding: 8px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <button id="run-btn" disabled>Loading SQL Engine...</button>
    </div>

    <div id="main">
        <div id="left">
            <textarea id="sql-input">-- Create a table and insert data
CREATE TABLE employees (id INT, name TEXT, role TEXT);
INSERT INTO employees VALUES 
  (1, 'Alice', 'Engineer'),
  (2, 'Bob', 'Manager'),
  (3, 'Charlie', 'Designer');

-- This SELECT will be visualized on the right
SELECT * FROM employees;</textarea>
        </div>
        
        <!-- The draggable middle line -->
        <div id="resizer"></div>
        
        <div id="right">
            <div id="results">
                <div class="success-msg">Results will appear here.</div>
            </div>
        </div>
    </div>

    <!-- CodeMirror JS (from jsdelivr) -->
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/sql/sql.min.js"></script>
    
    <!-- SQL.js (from jsdelivr) -->
    <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>

    <script>
        // --- 1. Resizer Logic ---
        const resizer = document.getElementById('resizer');
        const leftPanel = document.getElementById('left');
        let isDragging = false;

        resizer.addEventListener('mousedown', function(e) {
            isDragging = true;
            resizer.classList.add('active');
            document.body.classList.add('no-select'); // Prevent highlight bleed
            document.body.style.cursor = 'col-resize';
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            
            // Constrain width to prevent crushing panels entirely (min 100px width for both)
            let newWidth = e.clientX;
            const minWidth = 100;
            const maxWidth = window.innerWidth - minWidth;
            
            if (newWidth < minWidth) newWidth = minWidth;
            if (newWidth > maxWidth) newWidth = maxWidth;

            leftPanel.style.flex = `0 0 ${newWidth}px`;
        });

        document.addEventListener('mouseup', function() {
            if (isDragging) {
                isDragging = false;
                resizer.classList.remove('active');
                document.body.classList.remove('no-select');
                document.body.style.cursor = '';
            }
        });


        // --- 2. Initialize CodeMirror Editor ---
        const editor = CodeMirror.fromTextArea(document.getElementById('sql-input'), {
            mode: 'text/x-sql',
            theme: 'dracula',
            lineNumbers: true,
            lineWrapping: true
        });

        // Professional Fix: Observe the left panel. If the user drags the resizer, 
        // the left panel changes size. We must instruct CodeMirror to recalculate
        // its layout, otherwise the cursor placement breaks visually.
        const resizeObserver = new ResizeObserver(() => {
            editor.refresh();
        });
        resizeObserver.observe(leftPanel);


        // --- 3. Initialize SQL.js ---
        let SQL;
        const runBtn = document.getElementById('run-btn');
        const resultsDiv = document.getElementById('results');

        initSqlJs({
            locateFile: file => `https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/${file}`
        }).then(function(sqlModule) {
            SQL = sqlModule;
            runBtn.innerText = 'RUN SQL';
            runBtn.disabled = false;
        }).catch(function(err) {
            resultsDiv.innerHTML = `<div class="error">Failed to load SQL.js: ${err.message}</div>`;
        });


        // --- 4. Run Logic (Resets Database Environment on Every Click) ---
        runBtn.addEventListener('click', () => {
            if (!SQL) return;
            
            // Clear previous results
            resultsDiv.innerHTML = '';
            
            // Create a brand new database environment
            const db = new SQL.Database();
            const sqlQuery = editor.getValue();

            try {
                // Execute the SQL
                const results = db.exec(sqlQuery);

                if (results.length === 0) {
                    resultsDiv.innerHTML = '<div class="success-msg">Query executed successfully. No results to display.</div>';
                } else {
                    // Loop over each SELECT statement's result
                    results.forEach(result => {
                        const table = document.createElement('table');
                        const thead = document.createElement('thead');
                        const tbody = document.createElement('tbody');

                        // Create Table Headers
                        const trHead = document.createElement('tr');
                        result.columns.forEach(col => {
                            const th = document.createElement('th');
                            th.textContent = col;
                            trHead.appendChild(th);
                        });
                        thead.appendChild(trHead);

                        // Create Table Rows
                        result.values.forEach(row => {
                            const tr = document.createElement('tr');
                            row.forEach(val => {
                                const td = document.createElement('td');
                                td.textContent = val !== null ? val : 'NULL'; 
                                tr.appendChild(td);
                            });
                            tbody.appendChild(tr);
                        });

                        table.appendChild(thead);
                        table.appendChild(tbody);
                        resultsDiv.appendChild(table);
                    });
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">${error.message}</div>`;
            } finally {
                // Wipe DB instance memory
                db.close();
            }
        });
    </script>
</body>
</html>
